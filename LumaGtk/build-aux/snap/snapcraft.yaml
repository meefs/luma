name: luma
base: core26
version: '0.1.0'
summary: The official Frida GUI
description: |
  Luma is a native app for interactive dynamic instrumentation,
  built on Frida. Persistent sessions, a live REPL, pluggable
  instruments, and real-time collaboration in a workspace that
  remembers where you left off.
website: https://luma.frida.re/
issues: https://github.com/frida/luma/issues

grade: devel
confinement: devmode

platforms:
  amd64:
    build-on: amd64

apps:
  luma:
    command: usr/local/bin/luma
    plugs:
      - home
      - network
      - process-control
      - system-observe

parts:
  swift:
    plugin: nil
    override-build: |
      curl -sL "https://download.swift.org/swift-6.2-release/ubuntu2404/swift-6.2-RELEASE/swift-6.2-RELEASE-ubuntu24.04.tar.gz" \
        -o swift.tar.gz
      # Unpack under /usr/local so the top-level bin/ and lib/ don't
      # collide with the root-level symlinks the luma part's
      # stage-packages also install.
      install -d "$CRAFT_PART_INSTALL/usr/local"
      tar xzf swift.tar.gz --strip-components=2 -C "$CRAFT_PART_INSTALL/usr/local"
      rm swift.tar.gz
      # core26 ships libxml2.so.16 only; Swift 6.2's ubuntu24 tarball
      # links libFoundationXML against libxml2.so.2. libFoundationXML's
      # DT_RUNPATH is $ORIGIN, so alias has to sit beside it under
      # lib/swift/linux.
      ln -sf /usr/lib/x86_64-linux-gnu/libxml2.so.16 \
        "$CRAFT_PART_INSTALL/usr/local/lib/swift/linux/libxml2.so.2"
    build-packages:
      - curl
      - libxml2-16
    prime:
      - -*

  nodejs:
    plugin: nil
    override-build: |
      curl -sL "https://nodejs.org/dist/v20.18.0/node-v20.18.0-linux-x64.tar.xz" \
        -o node.tar.xz
      install -d "$CRAFT_PART_INSTALL/usr/local"
      tar xJf node.tar.xz --strip-components=1 -C "$CRAFT_PART_INSTALL/usr/local"
      rm node.tar.xz
    build-packages:
      - curl
      - xz-utils
    prime:
      - -*

  frida-core:
    after: [nodejs]
    plugin: nil
    source: https://github.com/frida/frida-core.git
    source-branch: main
    override-build: |
      export PATH="$CRAFT_STAGE/usr/local/bin:$PATH"
      ./configure --enable-shared --enable-compiler-backend --without-prebuilds=sdk --prefix=/usr/local \
        -- --force-fallback-for=openssl,libelf \
           --libdir=lib \
           -Dcompat=disabled -Dserver=disabled -Dportal=disabled \
           -Dinject=disabled -Dgadget=disabled -Dtests=disabled
      make -j$(nproc)
      DESTDIR="$CRAFT_PART_INSTALL" python3 releng/meson/meson.py install -C build --skip-subprojects --no-rebuild
      # Rewrite .pc prefix to a pcfiledir-relative path so pkg-config
      # resolves cflags/libs against $CRAFT_STAGE after snapcraft's
      # staging step rather than the literal --prefix.
      sed -i 's|^prefix=.*|prefix=${pcfiledir}/../..|' \
        "$CRAFT_PART_INSTALL"/usr/local/lib/pkgconfig/*.pc
    build-packages:
      - git
      - curl
      - python3
      - python3-pip
      - valac
      - meson
      - ninja-build
      - golang-go
      - libglib2.0-dev
      - libgee-0.8-dev
      - libjson-glib-dev
      - libsoup-3.0-dev
      - libunwind-dev
      - libnice-dev
    prime:
      - usr/local/lib/libfrida-core-1.0.so*
      - usr/local/lib/frida-1.0

  radare2:
    plugin: nil
    override-build: |
      git clone https://github.com/radareorg/radare2.git src
      cd src
      git checkout 7ed1e8c6fd000b99c8aa6835e12bef1657d92746
      meson setup build --prefix=/usr/local --libdir=lib --default-library=static -Dstatic_runtime=true -Dcli=disabled -Duse_sys_zip=true
      ninja -C build
      DESTDIR="$CRAFT_PART_INSTALL" ninja -C build install
      sed -i 's|^prefix=.*|prefix=${pcfiledir}/../..|' \
        "$CRAFT_PART_INSTALL"/usr/local/lib/pkgconfig/*.pc
    build-packages:
      - git
      - pkg-config
      - meson
      - ninja-build
      - libzip-dev
      - zlib1g-dev
    prime:
      - -*

  luma:
    after: [swift, frida-core, radare2]
    plugin: nil
    source: https://github.com/frida/luma.git
    source-branch: main
    override-build: |
      export PATH="$CRAFT_STAGE/usr/local/bin:$PATH"
      export PKG_CONFIG_PATH="$CRAFT_STAGE/usr/local/lib/pkgconfig${PKG_CONFIG_PATH:+:$PKG_CONFIG_PATH}"
      export LD_LIBRARY_PATH="$CRAFT_STAGE/usr/local/lib${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}"
      export C_INCLUDE_PATH="$CRAFT_STAGE/usr/local/include${C_INCLUDE_PATH:+:$C_INCLUDE_PATH}"
      # SwiftPM derives package identity from the realpath of
      # .package(path: ...) — LumaGtk/Package.swift's
      # .package(path: "..") must therefore resolve to a directory
      # called "luma". $CRAFT_PART_BUILD is .../luma/build, which
      # SwiftPM reads as package "build"; rename the build tree to
      # .../luma/luma so the identity matches.
      PARENT="$(dirname "$CRAFT_PART_BUILD")"
      mv "$CRAFT_PART_BUILD" "$PARENT/luma"
      cd "$PARENT/luma/LumaGtk"
      make build SWIFT_BUILD_FLAGS="-c release"
      # Bundle the Swift runtime (from the swift part's staged tree,
      # test-only libs dropped) alongside the binary, plus a libxml2
      # alias so FoundationXML resolves on core26 (which ships only
      # libxml2.so.16). frida-core's libs are staged by the frida-core
      # part and get picked up via the binary's rpath.
      SWIFT_DST="$CRAFT_PART_INSTALL/usr/local/lib/luma/swift"
      install -d "$SWIFT_DST"
      for so in "$CRAFT_STAGE/usr/local/lib/swift/linux"/*.so; do
        case "$(basename "$so")" in
          libXCTest.so|libTesting.so|lib_Testing_Foundation.so) continue ;;
        esac
        cp -P "$so" "$SWIFT_DST/"
      done
      install -m644 /usr/lib/x86_64-linux-gnu/libxml2.so.16 \
        "$SWIFT_DST/libxml2.so.2"
      install -Dm755 .build/x86_64-unknown-linux-gnu/release/LumaGtk \
        "$CRAFT_PART_INSTALL/usr/local/bin/luma"
      # Bundle.module resolves SwiftPM's *.resources directories from
      # the executable's /proc/self/exe path — drop them next to the
      # binary so the app can start.
      for bundle in .build/x86_64-unknown-linux-gnu/release/*.resources; do
        [ -d "$bundle" ] && cp -a "$bundle" "$CRAFT_PART_INSTALL/usr/local/bin/"
      done
      strip --strip-unneeded "$CRAFT_PART_INSTALL/usr/local/bin/luma"
      strip --strip-unneeded "$SWIFT_DST"/*.so
      patchelf --set-rpath '$ORIGIN/../lib/luma/swift:$ORIGIN/../lib' \
               "$CRAFT_PART_INSTALL/usr/local/bin/luma"
      install -Dm644 data/re.frida.Luma.desktop "$CRAFT_PART_INSTALL/usr/local/share/applications/re.frida.Luma.desktop"
      install -Dm644 data/re.frida.Luma.xml "$CRAFT_PART_INSTALL/usr/local/share/mime/packages/re.frida.Luma.xml"
      for size in 32 48 64 128 256 512; do
        install -Dm644 "data/icons/hicolor/${size}x${size}/apps/re.frida.Luma.png" \
          "$CRAFT_PART_INSTALL/usr/local/share/icons/hicolor/${size}x${size}/apps/re.frida.Luma.png"
      done
      mv "$PARENT/luma" "$CRAFT_PART_BUILD"
    build-packages:
      - libgtk-4-dev
      - libadwaita-1-dev
      - libwebkitgtk-6.0-dev
      - libglib2.0-dev
      - libpango1.0-dev
      - libcairo2-dev
      - libharfbuzz-dev
      - libgdk-pixbuf-2.0-dev
      - libgraphene-1.0-dev
      - libepoxy-dev
      - librsvg2-dev
      - libsoup-3.0-dev
      - gobject-introspection
      - libgirepository1.0-dev
      - libatk1.0-dev
      - libxml2-dev
      - nodejs
      - npm
      - patchelf
      - pkg-config
    stage-packages:
      - libgtk-4-1
      - libadwaita-1-0
      - libwebkitgtk-6.0-4
      - libepoxy0
      - librsvg2-2
      - libsoup-3.0-0
