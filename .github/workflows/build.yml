name: Build

on:
  push:
    branches: [main]
    tags: ['[0-9]+.[0-9]+.[0-9]+']
  pull_request:

env:
  FRIDA_CORE_REF: "ac26f8fd8426e641163fb77f8a0acc5849d07fa6"
  RADARE2_REF: "7ed1e8c6fd000b99c8aa6835e12bef1657d92746"
  SPARKLE_VERSION: "2.9.1"
  SWIFT_VERSION: "6.2"
  # ilammy/msvc-dev-cmd hasn't cut a Node-24-compatible release yet
  # (v1 is its only major). Opt into Node 24 ahead of GitHub's
  # forced migration in June 2026 so the warning doesn't clutter
  # every build log in the meantime.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.compute.outputs.version }}
      build: ${{ steps.compute.outputs.build }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - id: compute
        run: |
          DESCRIPTION=$(git describe --tags --always --long --match='[0-9]*.[0-9]*.[0-9]*')
          if [[ "$DESCRIPTION" != *-*-g* ]]; then
            VERSION="0.0.0"
          else
            TAG="${DESCRIPTION%-*-g*}"
            REST="${DESCRIPTION#${TAG}-}"
            DISTANCE="${REST%-g*}"
            if [[ "$TAG" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)(-(.+))?$ ]]; then
              MAJOR="${BASH_REMATCH[1]}"
              MINOR="${BASH_REMATCH[2]}"
              MICRO="${BASH_REMATCH[3]}"
              SUFFIX="${BASH_REMATCH[5]}"
              if [ -z "$SUFFIX" ]; then
                if [ "$DISTANCE" -eq 0 ]; then
                  VERSION="$MAJOR.$MINOR.$MICRO"
                else
                  VERSION="$MAJOR.$MINOR.$((MICRO + 1))-dev.$((DISTANCE - 1))"
                fi
              else
                BASE="$MAJOR.$MINOR.$MICRO-$SUFFIX"
                if [ "$DISTANCE" -eq 0 ]; then
                  VERSION="$BASE"
                else
                  VERSION="$BASE-dev.$((DISTANCE - 1))"
                fi
              fi
            else
              echo "Unexpected tag format: $TAG" >&2
              exit 1
            fi
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "build=${{ github.run_number }}" >> $GITHUB_OUTPUT

  frida-core:
    runs-on: macos-26
    strategy:
      fail-fast: false
      matrix:
        include:
          - { slice: macos-arm64,         min_os: 'macos=15.0', extra_disables: '',                                                                                                                       extra_meson: '' }
          - { slice: macos-x86_64,        min_os: 'macos=15.0', extra_disables: '',                                                                                                                       extra_meson: '' }
          - { slice: ios-arm64,           min_os: 'ios=26.0',   extra_disables: '--disable-local-backend --disable-simmy-backend --disable-fruity-backend --disable-droidy-backend --disable-barebone-backend', extra_meson: '-Dfrida-gum:jailbreak=disabled -Dglib-networking:apple_api_surface=public' }
          - { slice: ios-arm64-simulator, min_os: 'ios=26.0',   extra_disables: '--disable-local-backend --disable-simmy-backend --disable-fruity-backend --disable-droidy-backend --disable-barebone-backend', extra_meson: '-Dfrida-gum:jailbreak=disabled' }
    steps:
      - uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Restore frida-core cache
        id: cache
        uses: actions/cache/restore@v5
        with:
          path: ${{ runner.temp }}/devkit
          key: ${{ runner.os }}-frida-core-devkit-${{ matrix.slice }}-${{ matrix.min_os }}-${{ env.FRIDA_CORE_REF }}-v3

      - name: Set up Apple codesigning identities
        if: steps.cache.outputs.cache-hit != 'true'
        env:
          CERTIFICATES_P12: ${{ secrets.APPLE_CERTIFICATES_P12 }}
          CERTIFICATES_PASSWORD: ${{ secrets.APPLE_CERTIFICATES_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.APPLE_KEYCHAIN_PASSWORD }}
        run: |
          if [ -z "$CERTIFICATES_P12" ]; then
            echo "MACOS_CERTID=-" >> $GITHUB_ENV
            echo "IOS_CERTID=-" >> $GITHUB_ENV
            exit 0
          fi
          CERTIFICATE_PATH=$RUNNER_TEMP/apple-certificates.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/luma-frida-core.keychain-db
          echo -n "$CERTIFICATES_P12" | base64 --decode -o $CERTIFICATE_PATH
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security import $CERTIFICATE_PATH -P "$CERTIFICATES_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH
          rm $CERTIFICATE_PATH
          {
            echo "MACOS_CERTID=$(security find-identity -v -p codesigning | grep 'Developer ID Application: ' | awk '{ print $2 }')"
            echo "IOS_CERTID=$(security find-identity -v -p codesigning | grep 'Apple Distribution: ' | awk '{ print $2 }')"
          } >> $GITHUB_ENV

      - name: Clone frida-core
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          git clone https://github.com/frida/frida-core.git $RUNNER_TEMP/frida-core
          cd $RUNNER_TEMP/frida-core
          git checkout $FRIDA_CORE_REF
          git submodule update --init --recursive --depth 1

      - name: Install Go toolchain
        if: steps.cache.outputs.cache-hit != 'true'
        uses: actions/setup-go@v6
        with:
          go-version-file: ${{ runner.temp }}/frida-core/src/compiler/go.mod
          cache: false

      - name: Build frida-core
        if: steps.cache.outputs.cache-hit != 'true'
        env:
          GOTOOLCHAIN: auto
        run: |
          cd $RUNNER_TEMP/frida-core
          ./configure \
              --host=${{ matrix.slice }} \
              --prefix=$RUNNER_TEMP/frida-prefix \
              --with-apple-min-os=${{ matrix.min_os }} \
              --with-devkits=core \
              --enable-compiler-backend \
              --disable-server \
              --disable-portal \
              --disable-inject \
              --disable-gadget \
              --disable-tests \
              ${{ matrix.extra_disables }} \
              -- --force-fallback-for=nice ${{ matrix.extra_meson }}
          make -j$(sysctl -n hw.ncpu)
          make install
          DEVKIT_SRC=$RUNNER_TEMP/frida-prefix/lib/frida-1.0/devkits/core
          mkdir -p $RUNNER_TEMP/devkit
          cp $DEVKIT_SRC/libfrida-core.a $RUNNER_TEMP/devkit/
          cp $DEVKIT_SRC/frida-core.h $RUNNER_TEMP/devkit/

      - name: Save frida-core cache
        if: steps.cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: ${{ runner.temp }}/devkit
          key: ${{ runner.os }}-frida-core-devkit-${{ matrix.slice }}-${{ matrix.min_os }}-${{ env.FRIDA_CORE_REF }}-v3

      - uses: actions/upload-artifact@v7
        with:
          name: frida-core-devkit-${{ matrix.slice }}
          path: ${{ runner.temp }}/devkit
          if-no-files-found: error

  xcframework:
    runs-on: macos-26
    needs: frida-core
    steps:
      - name: Restore xcframework cache
        id: cache
        uses: actions/cache/restore@v5
        with:
          path: ${{ runner.temp }}/FridaCore.xcframework
          key: ${{ runner.os }}-frida-core-xcframework-${{ env.FRIDA_CORE_REF }}-v3

      - name: Download devkit artifacts
        if: steps.cache.outputs.cache-hit != 'true'
        uses: actions/download-artifact@v8
        with:
          path: ${{ runner.temp }}/devkits
          pattern: frida-core-devkit-*

      - name: Assemble FridaCore.xcframework
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          DEVKITS=$RUNNER_TEMP/devkits
          MACOS_LIB=$DEVKITS/macos-universal
          mkdir -p $MACOS_LIB
          lipo -create \
              $DEVKITS/frida-core-devkit-macos-arm64/libfrida-core.a \
              $DEVKITS/frida-core-devkit-macos-x86_64/libfrida-core.a \
              -output $MACOS_LIB/libfrida-core.a

          assemble_headers() {
            slice=$1
            src=$2
            out=$RUNNER_TEMP/headers-$slice
            mkdir -p $out/FridaCore
            cp $src/frida-core.h $out/
            cat > $out/FridaCore/module.modulemap <<'EOF'
          module FridaCore [extern_c] {
            header "../frida-core.h"
            export *
          }
          EOF
          }
          assemble_headers macos-universal       $DEVKITS/frida-core-devkit-macos-arm64
          assemble_headers ios-arm64             $DEVKITS/frida-core-devkit-ios-arm64
          assemble_headers ios-arm64-simulator   $DEVKITS/frida-core-devkit-ios-arm64-simulator

          rm -rf $RUNNER_TEMP/FridaCore.xcframework
          xcodebuild -create-xcframework \
              -library $MACOS_LIB/libfrida-core.a \
              -headers $RUNNER_TEMP/headers-macos-universal \
              -library $DEVKITS/frida-core-devkit-ios-arm64/libfrida-core.a \
              -headers $RUNNER_TEMP/headers-ios-arm64 \
              -library $DEVKITS/frida-core-devkit-ios-arm64-simulator/libfrida-core.a \
              -headers $RUNNER_TEMP/headers-ios-arm64-simulator \
              -output $RUNNER_TEMP/FridaCore.xcframework

      - name: Save xcframework cache
        if: steps.cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: ${{ runner.temp }}/FridaCore.xcframework
          key: ${{ runner.os }}-frida-core-xcframework-${{ env.FRIDA_CORE_REF }}-v3

      - uses: actions/upload-artifact@v7
        with:
          name: FridaCore.xcframework
          path: ${{ runner.temp }}/FridaCore.xcframework
          if-no-files-found: error

  macos:
    # Apple Silicon Xcode cross-compiles to x86_64 natively, so both
    # matrix entries run on the free arm64 runner — no paid -large
    # runner needed for the Intel slice.
    runs-on: macos-26
    needs: [version, xcframework]
    env:
      LUMA_VERSION: ${{ needs.version.outputs.version }}
      LUMA_BUILD: ${{ needs.version.outputs.build }}
    strategy:
      fail-fast: false
      matrix:
        arch: [arm64, x86_64]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install the Apple certificates
        env:
          CERTIFICATES_P12: ${{ secrets.APPLE_CERTIFICATES_P12 }}
          CERTIFICATES_PASSWORD: ${{ secrets.APPLE_CERTIFICATES_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.APPLE_KEYCHAIN_PASSWORD }}
        run: |
          if [ -z "$CERTIFICATES_P12" ]; then
            echo "No signing certificates configured, skipping"
            exit 0
          fi
          CERTIFICATE_PATH=$RUNNER_TEMP/apple-certificates.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/luma-signing.keychain-db
          echo -n "$CERTIFICATES_P12" | base64 --decode -o $CERTIFICATE_PATH
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security import $CERTIFICATE_PATH -P "$CERTIFICATES_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH
          rm $CERTIFICATE_PATH
          MACOS_CERTID=$(security find-identity -v -p codesigning | grep "Developer ID Application: " | awk '{ print $2 }')
          echo "MACOS_CERTID=$MACOS_CERTID" >> $GITHUB_ENV
          echo "CAN_SIGN=true" >> $GITHUB_ENV

      - name: Install the Developer ID provisioning profile
        env:
          DEVELOPER_ID_PROFILE: ${{ secrets.APPLE_DEVELOPER_ID_PROFILE }}
        run: |
          if [ "$CAN_SIGN" != "true" ]; then
            echo "Not signing; skipping provisioning profile"
            exit 0
          fi
          if [ -z "$DEVELOPER_ID_PROFILE" ]; then
            echo "CAN_SIGN=true but APPLE_DEVELOPER_ID_PROFILE is not set." >&2
            echo "The aps-environment entitlement requires an embedded Developer ID" >&2
            echo "provisioning profile, or macOS will refuse to launch the app." >&2
            exit 1
          fi
          PROFILE_PATH=$RUNNER_TEMP/developer-id.provisionprofile
          echo -n "$DEVELOPER_ID_PROFILE" | base64 --decode -o $PROFILE_PATH
          echo "DEVELOPER_ID_PROFILE_PATH=$PROFILE_PATH" >> $GITHUB_ENV

      - name: Download FridaCore.xcframework
        uses: actions/download-artifact@v8
        with:
          name: FridaCore.xcframework
          path: ${{ runner.temp }}/FridaCore.xcframework

      - name: Override frida-swift with local FridaCore.xcframework
        run: |
          git clone https://github.com/frida/frida-swift.git $RUNNER_TEMP/frida-swift
          cp -R $RUNNER_TEMP/FridaCore.xcframework $RUNNER_TEMP/frida-swift/
          python3 - <<'PY'
          import os, re
          swift_pkg = os.path.join(os.environ["RUNNER_TEMP"], "frida-swift", "Package.swift")
          with open(swift_pkg) as f:
              text = f.read()
          text = re.sub(
              r"\.binaryTarget\(\s*name:\s*\"FridaCore\",\s*url:[^)]+\)",
              '.binaryTarget(\n        name: "FridaCore",\n        path: "FridaCore.xcframework"\n    )',
              text,
              count=1,
              flags=re.DOTALL,
          )
          # gioapple pulls in Network.framework; upstream's prebuilt xcframework
          # was OpenSSL-only and frida-swift only declares resolv.
          text = re.sub(
              r"linkerSettings:\s*\[",
              'linkerSettings: [\n                .linkedFramework("Network", .when(platforms: [.macOS, .iOS])),',
              text,
              count=1,
          )
          with open(swift_pkg, "w") as f:
              f.write(text)

          luma_pkg = "Package.swift"
          with open(luma_pkg) as f:
              text = f.read()
          frida_swift_path = os.path.join(os.environ["RUNNER_TEMP"], "frida-swift")
          text = re.sub(
              r'\.package\(url:\s*"https://github\.com/frida/frida-swift"[^)]*\)',
              f'.package(path: "{frida_swift_path}")',
              text,
              count=1,
          )
          with open(luma_pkg, "w") as f:
              f.write(text)
          PY

      - name: Generate agent bundle
        run: |
          xcodebuild \
            -project Luma.xcodeproj \
            -scheme AgentBundle \
            -configuration Release \
            -derivedDataPath build/.derived \
            build

      - name: Build
        run: |
          xcodebuild \
            -project Luma.xcodeproj \
            -scheme Luma \
            -configuration Release \
            -derivedDataPath build/.derived \
            -arch ${{ matrix.arch }} \
            MARKETING_VERSION=$LUMA_VERSION \
            CURRENT_PROJECT_VERSION=$LUMA_BUILD \
            CODE_SIGN_IDENTITY=- \
            CODE_SIGNING_ALLOWED=NO \
            build
          mkdir -p build
          cp -r build/.derived/Build/Products/Release/Luma.app build/

      - name: Post-process binary
        run: |
          strip -Sx build/Luma.app/Contents/MacOS/Luma
          R2_RES=build/Luma.app/Contents/Frameworks/Radare2.framework/Versions/A/Resources
          rm -rf "$R2_RES/scripts" "$R2_RES/www"
          for fw in build/Luma.app/Contents/Frameworks/*.framework; do
            # xcodebuild's Embed Frameworks resolves the framework's
            # symlinks (Versions/Current and the top-level Foo,
            # Resources, Updater.app, ...) into real files/dirs, leaving
            # parallel copies that confuse codesign with "bundle format
            # is ambiguous". Restore the canonical structure.
            ver=$(find "$fw/Versions" -mindepth 1 -maxdepth 1 -type d \
                   ! -name Current 2>/dev/null | head -n 1)
            if [ -n "$ver" ]; then
              vername=$(basename "$ver")
              if [ ! -L "$fw/Versions/Current" ]; then
                rm -rf "$fw/Versions/Current"
                ln -s "$vername" "$fw/Versions/Current"
              fi
              for entry in "$ver"/*; do
                name=$(basename "$entry")
                if [ -e "$fw/$name" ] && [ ! -L "$fw/$name" ]; then
                  rm -rf "$fw/$name"
                  ln -s "Versions/Current/$name" "$fw/$name"
                fi
              done
            fi
            name=$(basename "$fw" .framework)
            bin="$fw/$name"
            [ -L "$bin" ] && bin=$(realpath "$bin")
            if lipo -info "$bin" 2>/dev/null | grep -q 'Architectures in the fat'; then
              lipo -thin ${{ matrix.arch }} "$bin" -output "$bin.thin"
              mv "$bin.thin" "$bin"
            fi
          done

      - name: Sign
        if: env.CAN_SIGN == 'true'
        run: |
          sign() {
            codesign --force --options runtime --timestamp \
              --sign "Developer ID Application" "$1"
          }
          SPARKLE=build/Luma.app/Contents/Frameworks/Sparkle.framework
          if [ -d "$SPARKLE" ]; then
            if [ -d "$SPARKLE/Versions/Current" ]; then
              SPARKLE_ROOT="$SPARKLE/Versions/Current"
            else
              SPARKLE_ROOT="$SPARKLE"
            fi
            [ -f "$SPARKLE_ROOT/Autoupdate" ] && sign "$SPARKLE_ROOT/Autoupdate"
            for xpc in "$SPARKLE_ROOT"/XPCServices/*.xpc; do
              [ -d "$xpc" ] && sign "$xpc"
            done
            [ -d "$SPARKLE_ROOT/Updater.app" ] && sign "$SPARKLE_ROOT/Updater.app"
          fi
          find build/Luma.app/Contents/Frameworks -name '*.framework' -maxdepth 1 | while read fw; do
            sign "$fw"
          done
          cp "$DEVELOPER_ID_PROFILE_PATH" build/Luma.app/Contents/embedded.provisionprofile
          codesign --force --options runtime \
            --sign "Developer ID Application" \
            --entitlements Luma/Luma-macOS.entitlements \
            --timestamp \
            build/Luma.app

      - name: Notarize
        if: env.CAN_SIGN == 'true'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          NOTARY_PASSWORD: ${{ secrets.APPLE_NOTARY_PASSWORD }}
        run: |
          xcrun notarytool store-credentials "notarytool-profile" \
            --apple-id "$APPLE_ID" \
            --team-id "$TEAM_ID" \
            --password "$NOTARY_PASSWORD"
          ditto -c -k --sequesterRsrc build/Luma.app Luma-notarize.zip
          RESULT=$(xcrun notarytool submit Luma-notarize.zip \
            --keychain-profile "notarytool-profile" \
            --wait 2>&1) || true
          echo "$RESULT"
          ID=$(echo "$RESULT" | grep '  id:' | head -1 | awk '{print $2}')
          STATUS=$(echo "$RESULT" | grep '  status:' | head -1 | awk '{print $2}')
          if [ "$STATUS" != "Accepted" ]; then
            echo "--- Notarization log ---"
            xcrun notarytool log "$ID" --keychain-profile "notarytool-profile" 2>&1 || true
            exit 1
          fi
          xcrun stapler staple build/Luma.app

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Create DMG
        run: |
          create-dmg \
            --volname "Luma" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "Luma.app" 150 185 \
            --app-drop-link 450 185 \
            --no-internet-enable \
            Luma-${LUMA_VERSION}-${{ matrix.arch }}.dmg \
            build/Luma.app

      - name: Sign DMG for Sparkle
        if: env.CAN_SIGN == 'true'
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          if [ -z "$SPARKLE_PRIVATE_KEY" ]; then
            echo "SPARKLE_PRIVATE_KEY secret is not set." >&2
            echo "Sparkle requires every DMG to be signed with the EdDSA" >&2
            echo "private key paired with SUPublicEDKey in Info.plist," >&2
            echo "or the auto-updater will refuse the download." >&2
            exit 1
          fi
          SPARKLE_DIR=$RUNNER_TEMP/sparkle
          mkdir -p $SPARKLE_DIR
          curl -sL "https://github.com/sparkle-project/Sparkle/releases/download/${SPARKLE_VERSION}/Sparkle-${SPARKLE_VERSION}.tar.xz" \
            | tar -xJf - -C $SPARKLE_DIR
          KEY_FILE=$RUNNER_TEMP/sparkle-priv.key
          printf %s "$SPARKLE_PRIVATE_KEY" > $KEY_FILE
          chmod 600 $KEY_FILE
          DMG=Luma-${LUMA_VERSION}-${{ matrix.arch }}.dmg
          SIG_LINE=$($SPARKLE_DIR/bin/sign_update -f $KEY_FILE "$DMG")
          rm -f $KEY_FILE
          echo "$SIG_LINE"
          SIG=$(echo "$SIG_LINE" | sed -E 's/.*sparkle:edSignature="([^"]+)".*/\1/')
          if [ -z "$SIG" ] || [ "$SIG" = "$SIG_LINE" ]; then
            echo "Failed to extract edSignature from sign_update output." >&2
            exit 1
          fi
          printf %s "$SIG" > "${DMG}.sig"

      - uses: actions/upload-artifact@v7
        with:
          name: Luma-${{ env.LUMA_VERSION }}-${{ matrix.arch }}.dmg
          path: Luma-${{ env.LUMA_VERSION }}-${{ matrix.arch }}.dmg

      - uses: actions/upload-artifact@v7
        if: env.CAN_SIGN == 'true'
        with:
          name: Luma-${{ env.LUMA_VERSION }}-${{ matrix.arch }}.dmg.sig
          path: Luma-${{ env.LUMA_VERSION }}-${{ matrix.arch }}.dmg.sig

  ios:
    runs-on: macos-26
    needs: [version, xcframework]
    env:
      LUMA_VERSION: ${{ needs.version.outputs.version }}
      LUMA_BUILD: ${{ needs.version.outputs.build }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install the Apple certificates
        env:
          CERTIFICATES_P12: ${{ secrets.APPLE_CERTIFICATES_P12 }}
          CERTIFICATES_PASSWORD: ${{ secrets.APPLE_CERTIFICATES_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.APPLE_KEYCHAIN_PASSWORD }}
        run: |
          if [ -z "$CERTIFICATES_P12" ]; then
            echo "No signing certificates configured, will build unsigned"
            exit 0
          fi
          CERTIFICATE_PATH=$RUNNER_TEMP/apple-certificates.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/luma-signing.keychain-db
          echo -n "$CERTIFICATES_P12" | base64 --decode -o $CERTIFICATE_PATH
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security import $CERTIFICATE_PATH -P "$CERTIFICATES_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH
          rm $CERTIFICATE_PATH
          if ! security find-identity -v -p codesigning | grep -q "Apple Distribution"; then
            echo "No Apple Distribution identity in the provided certificate bundle." >&2
            echo "Add one to APPLE_CERTIFICATES_P12 to enable iOS archive builds." >&2
            exit 0
          fi
          echo "CAN_SIGN=true" >> $GITHUB_ENV

      - name: Install the App Store provisioning profile
        if: env.CAN_SIGN == 'true'
        env:
          APP_STORE_PROFILE: ${{ secrets.APPLE_APP_STORE_PROFILE }}
        run: |
          if [ -z "$APP_STORE_PROFILE" ]; then
            echo "CAN_SIGN=true but APPLE_APP_STORE_PROFILE is not set." >&2
            echo "An App Store provisioning profile for re.frida.Luma is" >&2
            echo "required to archive for iOS." >&2
            exit 1
          fi
          PROFILE_PATH=$RUNNER_TEMP/app-store.mobileprovision
          echo -n "$APP_STORE_PROFILE" | base64 --decode -o $PROFILE_PATH
          UUID=$(security cms -D -i $PROFILE_PATH | plutil -extract UUID raw -)
          INSTALL_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$INSTALL_DIR"
          cp $PROFILE_PATH "$INSTALL_DIR/$UUID.mobileprovision"
          echo "LUMA_IOS_PROFILE=$UUID" >> $GITHUB_ENV

      - name: Install the App Store Connect API key
        if: env.CAN_SIGN == 'true' && github.ref_type == 'tag'
        env:
          KEY_ID: ${{ secrets.APPLE_APP_STORE_CONNECT_KEY_ID }}
          ISSUER_ID: ${{ secrets.APPLE_APP_STORE_CONNECT_ISSUER_ID }}
          KEY_P8: ${{ secrets.APPLE_APP_STORE_CONNECT_KEY_P8 }}
        run: |
          if [ -z "$KEY_ID" ] || [ -z "$ISSUER_ID" ] || [ -z "$KEY_P8" ]; then
            echo "Tag push with CAN_SIGN=true but App Store Connect API" >&2
            echo "credentials are not set. Configure _KEY_ID, _ISSUER_ID" >&2
            echo "and _KEY_P8 so altool can upload to TestFlight." >&2
            exit 1
          fi
          KEYS_DIR=$HOME/.appstoreconnect/private_keys
          mkdir -p $KEYS_DIR
          KEY_FILE=$KEYS_DIR/AuthKey_${KEY_ID}.p8
          printf %s "$KEY_P8" > $KEY_FILE
          echo "ASC_KEY_ID=$KEY_ID" >> $GITHUB_ENV
          echo "ASC_ISSUER_ID=$ISSUER_ID" >> $GITHUB_ENV
          echo "ASC_KEY_FILE=$KEY_FILE" >> $GITHUB_ENV

      - name: Download FridaCore.xcframework
        uses: actions/download-artifact@v8
        with:
          name: FridaCore.xcframework
          path: ${{ runner.temp }}/FridaCore.xcframework

      - name: Override frida-swift with local FridaCore.xcframework
        run: |
          git clone https://github.com/frida/frida-swift.git $RUNNER_TEMP/frida-swift
          cp -R $RUNNER_TEMP/FridaCore.xcframework $RUNNER_TEMP/frida-swift/
          python3 - <<'PY'
          import os, re
          swift_pkg = os.path.join(os.environ["RUNNER_TEMP"], "frida-swift", "Package.swift")
          with open(swift_pkg) as f:
              text = f.read()
          text = re.sub(
              r"\.binaryTarget\(\s*name:\s*\"FridaCore\",\s*url:[^)]+\)",
              '.binaryTarget(\n        name: "FridaCore",\n        path: "FridaCore.xcframework"\n    )',
              text,
              count=1,
              flags=re.DOTALL,
          )
          # gioapple pulls in Network.framework; upstream's prebuilt xcframework
          # was OpenSSL-only and frida-swift only declares resolv.
          text = re.sub(
              r"linkerSettings:\s*\[",
              'linkerSettings: [\n                .linkedFramework("Network", .when(platforms: [.macOS, .iOS])),',
              text,
              count=1,
          )
          with open(swift_pkg, "w") as f:
              f.write(text)

          luma_pkg = "Package.swift"
          with open(luma_pkg) as f:
              text = f.read()
          frida_swift_path = os.path.join(os.environ["RUNNER_TEMP"], "frida-swift")
          text = re.sub(
              r'\.package\(url:\s*"https://github\.com/frida/frida-swift"[^)]*\)',
              f'.package(path: "{frida_swift_path}")',
              text,
              count=1,
          )
          with open(luma_pkg, "w") as f:
              f.write(text)
          PY

      - name: Generate agent bundle
        run: |
          xcodebuild \
            -project Luma.xcodeproj \
            -scheme AgentBundle \
            -configuration Release \
            -derivedDataPath build/.derived-ios \
            build

      - name: Build (unsigned, iOS Simulator)
        if: env.CAN_SIGN != 'true'
        run: |
          xcodebuild \
            -project Luma.xcodeproj \
            -scheme Luma \
            -configuration Release \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath build/.derived-ios \
            ARCHS=arm64 \
            ONLY_ACTIVE_ARCH=YES \
            CODE_SIGN_IDENTITY=- \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Archive
        if: env.CAN_SIGN == 'true'
        env:
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcodebuild \
            -project Luma.xcodeproj \
            -scheme Luma \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath build/Luma.xcarchive \
            -derivedDataPath build/.derived-ios \
            DEVELOPMENT_TEAM=$TEAM_ID \
            LUMA_IOS_PROFILE=$LUMA_IOS_PROFILE \
            MARKETING_VERSION=$LUMA_VERSION \
            CURRENT_PROJECT_VERSION=$LUMA_BUILD \
            archive

      - name: Sanitize embedded Radare2 framework
        if: env.CAN_SIGN == 'true'
        run: |
          APP=build/Luma.xcarchive/Products/Applications/Luma.app
          FRAMEWORK="$APP/Frameworks/Radare2.framework"
          rm -rf "$FRAMEWORK/scripts" "$FRAMEWORK/www"
          MIN_IOS=$(plutil -extract MinimumOSVersion raw "$APP/Info.plist")
          plutil -insert MinimumOSVersion -string "$MIN_IOS" "$FRAMEWORK/Info.plist"
          SIGN_ID=$(security find-identity -v -p codesigning | awk '/Apple Distribution/ {print $2; exit}')
          codesign --force --sign "$SIGN_ID" "$FRAMEWORK"

      - name: Export IPA
        if: env.CAN_SIGN == 'true'
        env:
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          EXPORT_OPTIONS=$RUNNER_TEMP/ExportOptions.plist
          cat > $EXPORT_OPTIONS <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store-connect</string>
              <key>destination</key>
              <string>export</string>
              <key>teamID</key>
              <string>$TEAM_ID</string>
              <key>signingStyle</key>
              <string>manual</string>
              <key>stripSwiftSymbols</key>
              <true/>
              <key>uploadSymbols</key>
              <true/>
              <key>provisioningProfiles</key>
              <dict>
                  <key>re.frida.Luma</key>
                  <string>$LUMA_IOS_PROFILE</string>
              </dict>
          </dict>
          </plist>
          EOF
          xcodebuild -exportArchive \
            -archivePath build/Luma.xcarchive \
            -exportPath build/ipa \
            -exportOptionsPlist $EXPORT_OPTIONS
          mv build/ipa/Luma.ipa Luma-${LUMA_VERSION}.ipa

      - uses: actions/upload-artifact@v7
        if: env.CAN_SIGN == 'true'
        with:
          name: Luma-${{ env.LUMA_VERSION }}.ipa
          path: Luma-${{ env.LUMA_VERSION }}.ipa

      - name: Upload to TestFlight
        if: env.CAN_SIGN == 'true' && github.ref_type == 'tag'
        run: |
          xcrun altool --upload-app \
            --type ios \
            --file Luma-${LUMA_VERSION}.ipa \
            --apiKey "$ASC_KEY_ID" \
            --apiIssuer "$ASC_ISSUER_ID"

  fedora:
    runs-on: ubuntu-latest
    container: fedora:43
    needs: version
    env:
      LUMA_VERSION: ${{ needs.version.outputs.version }}
    steps:
      - name: Install system dependencies
        run: |
          dnf install -y \
            gtk4-devel \
            libadwaita-devel \
            webkitgtk6.0-devel \
            glib2-devel \
            pango-devel \
            cairo-devel \
            harfbuzz-devel \
            gdk-pixbuf2-devel \
            graphene-devel \
            libepoxy-devel \
            librsvg2-devel \
            libsoup3-devel \
            gobject-introspection-devel \
            atk-devel \
            libxml2-devel \
            libzip-devel \
            zlib-devel \
            libgee-devel \
            json-glib-devel \
            libunwind-devel \
            libdwarf-devel \
            elfutils-devel \
            libnice-devel \
            ngtcp2-devel \
            ngtcp2-crypto-ossl-devel \
            openssl-devel \
            vala \
            meson \
            ninja-build \
            nodejs \
            npm \
            gcc \
            gcc-c++ \
            libstdc++-devel \
            libstdc++-static \
            kernel-headers \
            glibc-devel \
            make \
            git \
            which \
            curl \
            pkg-config \
            rpm-build \
            python3-pip \
            python3-setuptools \
            swiftlang \
            golang \
            patchelf \
            rsync
          swift --version

      - name: Restore frida-core cache
        id: frida-cache
        uses: actions/cache/restore@v5
        with:
          path: /tmp/frida-destdir
          key: ${{ runner.os }}-fedora43-frida-core-${{ env.FRIDA_CORE_REF }}-v3

      - name: Build frida-core (shared)
        if: steps.frida-cache.outputs.cache-hit != 'true'
        env:
          CC: gcc
          CXX: g++
        run: |
          git clone https://github.com/frida/frida-core.git /tmp/frida-core
          cd /tmp/frida-core
          git checkout $FRIDA_CORE_REF
          ./configure --enable-shared --enable-compiler-backend --without-prebuilds=sdk --prefix=/usr
          make -j$(nproc)
          DESTDIR=/tmp/frida-destdir make install

      - name: Save frida-core cache
        if: steps.frida-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: /tmp/frida-destdir
          key: ${{ runner.os }}-fedora43-frida-core-${{ env.FRIDA_CORE_REF }}-v3

      - name: Install frida-core
        run: |
          cp -a /tmp/frida-destdir/usr/. /usr/
          ldconfig

      - name: Restore radare2 cache
        id: r2-cache
        uses: actions/cache/restore@v5
        with:
          path: /tmp/r2-destdir
          key: ${{ runner.os }}-fedora43-radare2-${{ env.RADARE2_REF }}-v2

      - name: Build radare2 (static)
        if: steps.r2-cache.outputs.cache-hit != 'true'
        env:
          CC: gcc
          CXX: g++
        run: |
          git clone https://github.com/radareorg/radare2.git /tmp/radare2
          cd /tmp/radare2
          git checkout $RADARE2_REF
          meson setup build --prefix=/usr --default-library=static -Dstatic_runtime=true -Dcli=disabled -Duse_sys_zip=true
          DESTDIR=/tmp/r2-destdir ninja -C build install

      - name: Save radare2 cache
        if: steps.r2-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: /tmp/r2-destdir
          key: ${{ runner.os }}-fedora43-radare2-${{ env.RADARE2_REF }}-v2

      - name: Install radare2
        run: |
          cp -a /tmp/r2-destdir/usr/. /usr/
          ldconfig

      - uses: actions/checkout@v6

      - name: Build
        run: cd LumaGtk && make build SWIFT_BUILD_FLAGS="-c release"

      - name: Package as .rpm
        run: |
          TOP=$PWD/rpmbuild
          mkdir -p $TOP/{SOURCES/stage,SPECS,BUILD,BUILDROOT,RPMS,SRPMS}
          LumaGtk/build-aux/linux/stage.sh \
              $TOP/SOURCES/stage \
              LumaGtk/.build/x86_64-unknown-linux-gnu/release/LumaGtk \
              /usr/lib64
          cp LumaGtk/build-aux/rpm/luma.spec $TOP/SPECS/
          NATIVE_VERSION=$(echo "$LUMA_VERSION" | tr - '~')
          rpmbuild --define "_topdir $TOP" \
                   --define "version $NATIVE_VERSION" \
                   -bb $TOP/SPECS/luma.spec
          cp $TOP/RPMS/x86_64/luma-${NATIVE_VERSION}-*.x86_64.rpm luma-${LUMA_VERSION}-fedora-43-x86_64.rpm

      - uses: actions/upload-artifact@v7
        with:
          name: luma-${{ env.LUMA_VERSION }}-fedora-43-x86_64.rpm
          path: luma-${{ env.LUMA_VERSION }}-fedora-43-x86_64.rpm

  ubuntu:
    runs-on: ubuntu-latest
    container: ubuntu:${{ matrix.release }}
    needs: version
    strategy:
      fail-fast: false
      matrix:
        include:
          - release: "24.04"
            libzip_dep: libzip4t64
            libxml2_path: ""
            extra_runtime_deps: ", libxml2"
          - release: "26.04"
            libzip_dep: libzip5
            libxml2_path: /usr/lib/x86_64-linux-gnu/libxml2.so.16
            extra_runtime_deps: ""
    env:
      LUMA_VERSION: ${{ needs.version.outputs.version }}
    steps:
      - name: Install system dependencies
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          apt-get update
          apt-get install -y software-properties-common
          add-apt-repository -y universe
          apt-get update
          apt-get install -y \
            libgtk-4-dev \
            libadwaita-1-dev \
            libwebkitgtk-6.0-dev \
            libglib2.0-dev \
            libpango1.0-dev \
            libcairo2-dev \
            libharfbuzz-dev \
            libgdk-pixbuf-2.0-dev \
            libgraphene-1.0-dev \
            libepoxy-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            gobject-introspection \
            libgirepository1.0-dev \
            libatk1.0-dev \
            libxml2-dev \
            libzip-dev \
            zlib1g-dev \
            libgee-0.8-dev \
            libjson-glib-dev \
            libunwind-dev \
            libnice-dev \
            valac \
            meson \
            ninja-build \
            pkg-config \
            dpkg-dev \
            nodejs \
            npm \
            curl \
            git \
            make \
            binutils \
            python3-pip \
            gcc \
            g++ \
            libncurses6 \
            libcurl4-openssl-dev \
            golang-go \
            patchelf \
            rsync

      - name: Install Swift
        run: |
          if [ "${{ matrix.release }}" = "26.04" ]; then
            ln -sf libxml2.so.16 /usr/lib/x86_64-linux-gnu/libxml2.so.2
            ldconfig
          fi
          curl -sLO "https://download.swift.org/swift-${SWIFT_VERSION}-release/ubuntu2404/swift-${SWIFT_VERSION}-RELEASE/swift-${SWIFT_VERSION}-RELEASE-ubuntu24.04.tar.gz"
          tar xzf swift-*.tar.gz -C /usr/local --strip-components=2
          rm swift-*.tar.gz
          ldconfig
          swift --version

      - name: Restore frida-core cache
        id: frida-cache
        uses: actions/cache/restore@v5
        with:
          path: /tmp/frida-destdir
          key: ${{ runner.os }}-ubuntu${{ matrix.release }}-frida-core-${{ env.FRIDA_CORE_REF }}-v3

      - name: Build frida-core (shared)
        if: steps.frida-cache.outputs.cache-hit != 'true'
        run: |
          git clone https://github.com/frida/frida-core.git /tmp/frida-core
          cd /tmp/frida-core
          git checkout $FRIDA_CORE_REF
          ./configure --enable-shared --enable-compiler-backend --without-prebuilds=sdk --prefix=/usr \
            -- --force-fallback-for=openssl
          make -j$(nproc)
          DESTDIR=/tmp/frida-destdir make install

      - name: Save frida-core cache
        if: steps.frida-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: /tmp/frida-destdir
          key: ${{ runner.os }}-ubuntu${{ matrix.release }}-frida-core-${{ env.FRIDA_CORE_REF }}-v3

      - name: Install frida-core
        run: |
          cp -a /tmp/frida-destdir/usr/. /usr/
          ldconfig

      - name: Restore radare2 cache
        id: r2-cache
        uses: actions/cache/restore@v5
        with:
          path: /tmp/r2-destdir
          key: ${{ runner.os }}-ubuntu${{ matrix.release }}-radare2-${{ env.RADARE2_REF }}-v2

      - name: Build radare2 (static)
        if: steps.r2-cache.outputs.cache-hit != 'true'
        run: |
          git clone https://github.com/radareorg/radare2.git /tmp/radare2
          cd /tmp/radare2
          git checkout $RADARE2_REF
          meson setup build --prefix=/usr --default-library=static -Dstatic_runtime=true -Dcli=disabled -Duse_sys_zip=true
          DESTDIR=/tmp/r2-destdir ninja -C build install

      - name: Save radare2 cache
        if: steps.r2-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: /tmp/r2-destdir
          key: ${{ runner.os }}-ubuntu${{ matrix.release }}-radare2-${{ env.RADARE2_REF }}-v2

      - name: Install radare2
        run: |
          cp -a /tmp/r2-destdir/usr/. /usr/
          ldconfig

      - uses: actions/checkout@v6

      - name: Build
        run: cd LumaGtk && make build SWIFT_BUILD_FLAGS="-c release"

      - name: Package as .deb
        shell: bash
        run: |
          NATIVE_VERSION=$(echo "$LUMA_VERSION" | tr - '~')
          PKG=luma_${NATIVE_VERSION}_amd64
          LumaGtk/build-aux/linux/stage.sh \
              $PKG \
              LumaGtk/.build/x86_64-unknown-linux-gnu/release/LumaGtk \
              /usr/lib/x86_64-linux-gnu \
              /usr/local/lib/swift/linux \
              ${{ matrix.libxml2_path }}
          mkdir -p $PKG/DEBIAN
          printf 'Package: luma\nVersion: %s\nSection: devel\nPriority: optional\nArchitecture: amd64\nDepends: libadwaita-1-0, libwebkitgtk-6.0-4, libepoxy0, %s, libnice10%s\nMaintainer: Ole Andre Vadla Ravnas <oleavr@frida.re>\nHomepage: https://luma.frida.re/\nDescription: the official Frida GUI\n Luma is a native app for interactive dynamic instrumentation,\n built on Frida. Persistent sessions, a live REPL, pluggable\n instruments, and real-time collaboration in a workspace that\n remembers where you left off.\n' "$NATIVE_VERSION" "${{ matrix.libzip_dep }}" "${{ matrix.extra_runtime_deps }}" > $PKG/DEBIAN/control
          install -m0755 LumaGtk/build-aux/linux/deb-postinst $PKG/DEBIAN/postinst
          install -m0755 LumaGtk/build-aux/linux/deb-postrm   $PKG/DEBIAN/postrm
          dpkg-deb --build $PKG
          mv ${PKG}.deb luma-${LUMA_VERSION}-ubuntu-${{ matrix.release }}-x86_64.deb

      - uses: actions/upload-artifact@v7
        with:
          name: luma-${{ env.LUMA_VERSION }}-ubuntu-${{ matrix.release }}-x86_64.deb
          path: luma-${{ env.LUMA_VERSION }}-ubuntu-${{ matrix.release }}-x86_64.deb

  flatpak:
    runs-on: ubuntu-latest
    needs: version
    env:
      LUMA_VERSION: ${{ needs.version.outputs.version }}
    steps:
      - uses: actions/checkout@v6

      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
                      /opt/hostedtoolcache/CodeQL /usr/local/share/boost \
                      "$AGENT_TOOLSDIRECTORY"
          sudo docker image prune --all --force || true
          df -h

      - name: Install Flatpak and flatpak-builder
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder
          sudo flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          sudo flatpak install -y flathub org.gnome.Platform//50 org.gnome.Sdk//50

      - name: Restore flatpak-builder cache
        id: flatpak-cache
        uses: actions/cache/restore@v5
        with:
          path: .flatpak-builder
          key: flatpak-builder-v1

      - name: Pin flatpak sources to the current tree
        run: |
          git archive --format=tar.gz --prefix=luma/ --output=/tmp/luma-source.tar.gz HEAD
          python3 - <<'PY'
          import json, os
          path = "LumaGtk/build-aux/flatpak/re.frida.Luma.json"
          with open(path) as f:
              manifest = json.load(f)
          for module in manifest.get("modules", []):
              for i, source in enumerate(module.get("sources", [])):
                  url = source.get("url", "")
                  if url.endswith("frida/frida-core.git"):
                      source.pop("branch", None)
                      source["commit"] = os.environ["FRIDA_CORE_REF"]
                  elif url.endswith("frida/luma.git"):
                      module["sources"][i] = {
                          "type": "archive",
                          "path": "/tmp/luma-source.tar.gz",
                      }
          with open(path, "w") as f:
              json.dump(manifest, f, indent=4)
          PY

      - name: Build Flatpak
        run: |
          flatpak-builder \
            --force-clean \
            --disable-rofiles-fuse \
            --keep-build-dirs \
            --repo=flatpak-repo \
            flatpak-build \
            LumaGtk/build-aux/flatpak/re.frida.Luma.json
          flatpak build-bundle flatpak-repo "luma-${LUMA_VERSION}-x86_64.flatpak" re.frida.Luma

      - name: Save flatpak-builder cache
        if: always()
        uses: actions/cache/save@v5
        with:
          path: .flatpak-builder
          key: flatpak-builder-v1

      - uses: actions/upload-artifact@v7
        with:
          name: luma-${{ env.LUMA_VERSION }}-x86_64.flatpak
          path: luma-${{ env.LUMA_VERSION }}-x86_64.flatpak

  snap:
    runs-on: ubuntu-latest
    needs: version
    env:
      LUMA_VERSION: ${{ needs.version.outputs.version }}
    # Kept non-blocking as a safety net while the core26 snap build
    # settles on the hosted runners.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6

      - name: Set snap version
        run: |
          sed -i "s/^version: .*/version: '${LUMA_VERSION}'/" \
              LumaGtk/build-aux/snap/snapcraft.yaml

      - name: Pin snap sources to the current tree
        run: |
          # The snapcraft VM only sees files under the project path
          # (LumaGtk), so stage the tarball there.
          git archive --format=tar.gz --output=LumaGtk/luma-source.tar.gz HEAD
          python3 - <<'PY'
          import os, re
          path = "LumaGtk/build-aux/snap/snapcraft.yaml"
          with open(path) as f:
              text = f.read()
          text = re.sub(
              r"(source: https://github\.com/frida/frida-core\.git\n\s*)source-branch: main",
              lambda m: m.group(1) + "source-commit: " + os.environ["FRIDA_CORE_REF"],
              text,
          )
          text = re.sub(
              r"source: https://github\.com/frida/luma\.git\n(\s*)source-branch: main",
              r"source: luma-source.tar.gz\n\1source-type: tar",
              text,
          )
          with open(path, "w") as f:
              f.write(text)
          PY

      - uses: snapcore/action-build@v1.3.0
        id: snapcraft
        with:
          path: LumaGtk

      - name: Rename snap artifact
        run: cp "${{ steps.snapcraft.outputs.snap }}" "luma-${LUMA_VERSION}-x86_64.snap"

      - uses: actions/upload-artifact@v7
        with:
          name: luma-${{ env.LUMA_VERSION }}-x86_64.snap
          path: luma-${{ env.LUMA_VERSION }}-x86_64.snap

  windows:
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 240
    needs: version
    env:
      LUMA_VERSION: ${{ needs.version.outputs.version }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-2022
            win_arch: x86_64
            msvc_arch: amd64
            swift_build_arch: amd64
            vcpkg_triplet: x64-windows-release
            toolcache_arch: x64
            msys2_system: MINGW64
            msys2_package: mingw-w64-x86_64-gcc
          - runner: windows-11-arm
            win_arch: arm64
            msvc_arch: arm64
            swift_build_arch: arm64
            vcpkg_triplet: arm64-windows-release
            toolcache_arch: arm64
            msys2_system: CLANGARM64
            msys2_package: mingw-w64-clang-aarch64-clang
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "20"

      - uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.msvc_arch }}

      - uses: compnerd/gha-setup-swift@v0.4.0
        with:
          swift-version: "swift-${{ env.SWIFT_VERSION }}-release"
          swift-build: "${{ env.SWIFT_VERSION }}-RELEASE"
          build_arch: ${{ matrix.swift_build_arch }}

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build tools
        run: |
          pip install meson ninja setuptools

      - name: Restore vcpkg cache
        id: vcpkg-cache
        uses: actions/cache/restore@v5
        with:
          path: C:\vcpkg\installed
          key: vcpkg-${{ matrix.vcpkg_triplet }}-v9

      - name: Install dependencies via vcpkg
        run: >-
          vcpkg install
          --overlay-triplets=${{ github.workspace }}/.github/vcpkg-triplets
          --overlay-ports=${{ github.workspace }}/.github/vcpkg-ports
          --triplet ${{ matrix.vcpkg_triplet }}
          glib glib-networking json-glib libsoup gtk[introspection] atk[introspection] libadwaita[introspection] libepoxy librsvg libxml2 graphite2 sqlite3[snapshot] webview2

      - name: Save vcpkg cache
        if: steps.vcpkg-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: C:\vcpkg\installed
          key: vcpkg-${{ matrix.vcpkg_triplet }}-v9

      - name: Set up vcpkg environment
        shell: bash
        run: |
          VCPKG_PREFIX="C:/vcpkg/installed/${{ matrix.vcpkg_triplet }}"
          echo "$VCPKG_PREFIX/tools/pkgconf" >> $GITHUB_PATH
          echo "$VCPKG_PREFIX/bin" >> $GITHUB_PATH
          echo "$VCPKG_PREFIX/tools" >> $GITHUB_PATH
          echo "PKG_CONFIG_PATH=$VCPKG_PREFIX/lib/pkgconfig" >> $GITHUB_ENV
          # pkgconf on this runner classifies $VCPKG_PREFIX/include as a
          # system path (via the INCLUDE env var MSVC sets) and strips
          # -I fragments that live under it, which breaks glib's
          # -I${includedir}/glib-2.0 Cflags. Opt back in.
          echo "PKG_CONFIG_ALLOW_SYSTEM_CFLAGS=1" >> $GITHUB_ENV
          echo "PKG_CONFIG_ALLOW_SYSTEM_LIBS=1" >> $GITHUB_ENV
          echo "GIR_EXTRA_SEARCH_PATH=$VCPKG_PREFIX/share/gir-1.0" >> $GITHUB_ENV
          # Package.swift calls "pkg-config"; vcpkg ships pkgconf.exe. Alias it.
          if [ -f "$VCPKG_PREFIX/tools/pkgconf/pkgconf.exe" ] && [ ! -f "$VCPKG_PREFIX/tools/pkgconf/pkg-config.exe" ]; then
            cp "$VCPKG_PREFIX/tools/pkgconf/pkgconf.exe" "$VCPKG_PREFIX/tools/pkgconf/pkg-config.exe"
          fi
          # Mirror root-level vcpkg headers (WebView2.h, sqlite3.h,
          # ...) into a staging dir, skipping dirent.h whose vcpkg
          # polyfill clashes with Swift's _FoundationCShims. Put just
          # the shim on CPATH — everything else (gtk4, libadwaita,
          # frida-core, radare2, ...) propagates through SwiftPM's
          # .systemLibrary(pkgConfig:) resolver.
          STAGE="$VCPKG_PREFIX/include/vcpkg-shim"
          mkdir -p "$STAGE"
          for hdr in "$VCPKG_PREFIX"/include/*.h; do
            name=$(basename "$hdr")
            case "$name" in
              dirent.h) ;;
              *) cp "$hdr" "$STAGE/" ;;
            esac
          done
          echo "CPATH=$STAGE" >> $GITHUB_ENV
          echo "CPLUS_INCLUDE_PATH=$STAGE" >> $GITHUB_ENV

      - name: Install WiX Toolset
        if: matrix.win_arch == 'arm64'
        shell: pwsh
        run: choco install -y --no-progress wixtoolset

      - name: Pre-fetch Adwaita icon theme
        shell: pwsh
        run: |
          # Front-load the download so a flaky download.gnome.org or
          # SHA-256 mismatch fails the job before we burn time on
          # frida-core, radare2 and Swift builds. package-msi.ps1's
          # existing "skip download if file exists" check picks the
          # cached tarball up at staging time.
          $version = '50.0'
          $expectedSha = 'fac6e0401fca714780561a081b8f7e27c3bc1db34ebda4da175081f26b24d460'
          $url = "https://download.gnome.org/sources/adwaita-icon-theme/50/adwaita-icon-theme-$version.tar.xz"
          $dest = "$env:GITHUB_WORKSPACE\LumaGtk\build\adwaita-icon-theme-$version.tar.xz"
          New-Item -ItemType Directory -Force -Path (Split-Path -Parent $dest) | Out-Null
          Invoke-WebRequest -Uri $url -OutFile $dest
          $actualSha = (Get-FileHash $dest -Algorithm SHA256).Hash.ToLower()
          if ($actualSha -ne $expectedSha) {
              throw "Adwaita SHA-256 mismatch: expected $expectedSha, got $actualSha"
          }

      - name: Restore frida-core cache
        id: frida-cache
        uses: actions/cache/restore@v5
        with:
          path: ${{ runner.temp }}\frida-prefix
          key: ${{ runner.os }}-${{ matrix.win_arch }}-frida-core-${{ env.FRIDA_CORE_REF }}-v7

      - name: Install Go toolchain
        if: steps.frida-cache.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          # setup-go@v6 runs `go env GOPATH` within the same step as
          # addPath(), which on Node 24 + Windows never sees the
          # updated PATH and fails with "'go' is not recognized".
          # Hosted runners ship a preinstalled Go in the toolcache;
          # just surface it on PATH ourselves.
          $goRoot = Get-ChildItem 'C:\hostedtoolcache\windows\go' -Directory |
              Sort-Object { [version]$_.Name } -Descending |
              Select-Object -First 1
          $goBin = Join-Path $goRoot.FullName '${{ matrix.toolcache_arch }}\bin'
          "$goBin" >> $env:GITHUB_PATH
          & (Join-Path $goBin 'go.exe') version

      - name: Install MinGW toolchain for cgo
        if: steps.frida-cache.outputs.cache-hit != 'true'
        id: msys2
        uses: msys2/setup-msys2@v2
        with:
          msystem: ${{ matrix.msys2_system }}
          install: ${{ matrix.msys2_package }}


      - name: Build frida-core (shared)
        if: steps.frida-cache.outputs.cache-hit != 'true'
        env:
          MSYS2_LOCATION: ${{ steps.msys2.outputs.msys2-location }}
        run: |
          $ErrorActionPreference = 'Stop'
          git clone https://github.com/frida/frida-core.git $env:RUNNER_TEMP\frida-core
          Push-Location $env:RUNNER_TEMP\frida-core
          git checkout $env:FRIDA_CORE_REF
          git submodule update --init --recursive --depth 1
          python -c "import sys; sys.path.insert(0, '.'); from releng.meson_configure import main; main()" `
              . `
              --enable-shared `
              --enable-compiler-backend `
              --without-prebuilds=sdk `
              "--prefix=$env:RUNNER_TEMP\frida-prefix" `
              -- --force-fallback-for=openssl,libnghttp2 -Dtests=disabled
          if ($LASTEXITCODE -ne 0) {
              Write-Host "---- meson-log.txt ----"
              Get-Content build\meson-logs\meson-log.txt -ErrorAction SilentlyContinue
              throw "configure failed with exit code $LASTEXITCODE"
          }
          python releng/meson/meson.py compile -C build
          if ($LASTEXITCODE -ne 0) { throw "compile failed with exit code $LASTEXITCODE" }
          python releng/meson/meson.py install -C build --no-rebuild --skip-subprojects
          if ($LASTEXITCODE -ne 0) { throw "install failed with exit code $LASTEXITCODE" }
          Get-ChildItem "$env:RUNNER_TEMP\frida-prefix\lib\pkgconfig\*.pc" | ForEach-Object {
            (Get-Content $_.FullName) -replace '^prefix=.*', 'prefix=${pcfiledir}/../..' |
              Set-Content $_.FullName
          }
          Pop-Location

      - name: Save frida-core cache
        if: steps.frida-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: ${{ runner.temp }}\frida-prefix
          key: ${{ runner.os }}-${{ matrix.win_arch }}-frida-core-${{ env.FRIDA_CORE_REF }}-v7

      - name: Restore radare2 cache
        id: r2-cache
        uses: actions/cache/restore@v5
        with:
          path: ${{ runner.temp }}\r2-prefix
          key: ${{ runner.os }}-${{ matrix.win_arch }}-radare2-${{ env.RADARE2_REF }}-v3

      - name: Build radare2 (shared)
        if: steps.r2-cache.outputs.cache-hit != 'true'
        run: |
          git clone https://github.com/radareorg/radare2.git $env:RUNNER_TEMP\radare2
          Push-Location $env:RUNNER_TEMP\radare2
          git checkout $env:RADARE2_REF
          $env:CFLAGS = "/D_Static_assert=static_assert /std:c11"
          meson setup build "--prefix=$env:RUNNER_TEMP\r2-prefix" --default-library=shared -Dcli=disabled
          meson compile -C build
          meson install -C build
          Get-ChildItem "$env:RUNNER_TEMP\r2-prefix\lib\pkgconfig\*.pc" | ForEach-Object {
            (Get-Content $_.FullName) -replace '^prefix=.*', 'prefix=${pcfiledir}/../..' |
              Set-Content $_.FullName
          }
          Pop-Location

      - name: Save radare2 cache
        if: steps.r2-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: ${{ runner.temp }}\r2-prefix
          key: ${{ runner.os }}-${{ matrix.win_arch }}-radare2-${{ env.RADARE2_REF }}-v3

      - name: Update environment
        shell: bash
        run: |
          FRIDA_PKG="$RUNNER_TEMP/frida-prefix/lib/pkgconfig"
          R2_PKG="$RUNNER_TEMP/r2-prefix/lib/pkgconfig"
          VCPKG_PKG="C:/vcpkg/installed/${{ matrix.vcpkg_triplet }}/lib/pkgconfig"
          echo "PKG_CONFIG_PATH=$FRIDA_PKG;$R2_PKG;$VCPKG_PKG" >> $GITHUB_ENV
          echo "$RUNNER_TEMP\\frida-prefix\\bin" >> $GITHUB_PATH
          echo "$RUNNER_TEMP\\r2-prefix\\bin" >> $GITHUB_PATH

      - name: Install native sed/awk/cat for gir2swift post-processing
        shell: pwsh
        run: |
          # gir2swift shells out to sed, awk and cat to patch generated
          # Swift sources. Git for Windows' cygwin-based versions crash
          # at fork() time on Actions runners with "add_item (\??\C:\
          # Program Files\Git, /, ...) failed, errno 1" — a classic
          # cygwin heap-rebase failure. The consequence is missing types
          # like SequenceIterRef/SListProtocol in the SwiftGLib output
          # and later compile errors. Install GnuWin32's native Win32
          # ports and put them first on PATH so they win the PATH lookup.
          #
          # This step has to run *after* frida-core and radare2 are
          # built: gnuwin32-coreutils.install ships its own link.exe
          # (a coreutils alias for ln) that gets shimmed into
          # %ProgramData%\chocolatey\bin (already on PATH) and shadows
          # MSVC's link.exe, breaking meson's linker autodetect for any
          # subsequent meson build. Swift's link goes through SDKROOT
          # rather than PATH, so the LumaGtk build below is unaffected.
          choco install -y --no-progress sed gawk gnuwin32-coreutils.install
          $gnuBin = 'C:\Program Files (x86)\GnuWin32\bin'
          if (Test-Path (Join-Path $gnuBin 'gawk.exe')) {
              Copy-Item (Join-Path $gnuBin 'gawk.exe') (Join-Path $gnuBin 'awk.exe') -Force
          }
          Add-Content -Path $env:GITHUB_PATH -Value $gnuBin

      - name: Build LumaGtk
        shell: pwsh
        run: |
          # SwiftPM invokes swiftc.exe as the final link driver with
          # every .o, -L path and -l ref on the command line. On a
          # GTK/WebKit/Frida/r2 build that overshoots Windows' ~32 KB
          # CreateProcess limit and aborts with "The filename or
          # extension is too long". Map every long path that appears
          # on the link line to a drive-letter root via `subst`, which
          # collapses each prefix to 3 characters and keeps the
          # aggregate cmdline under the cap.
          $subst = Join-Path $env:WINDIR 'System32\subst.exe'
          $buildRoot = "$env:RUNNER_TEMP\b"
          New-Item -Path $buildRoot -ItemType Directory -Force | Out-Null
          $swiftRoot = Split-Path -Parent (Split-Path -Parent (Get-Command swift).Source)
          $vcpkgPrefix = "C:\vcpkg\installed\${{ matrix.vcpkg_triplet }}"
          $fridaPrefix = "$env:RUNNER_TEMP\frida-prefix"
          $r2Prefix    = "$env:RUNNER_TEMP\r2-prefix"
          $mappings = [ordered]@{
              'B:' = $buildRoot
              'T:' = $swiftRoot
              'V:' = $vcpkgPrefix
              'F:' = $fridaPrefix
              'R:' = $r2Prefix
          }
          foreach ($letter in $mappings.Keys) {
              & $subst $letter $mappings[$letter]
              if ($LASTEXITCODE -ne 0) { throw "subst $letter failed" }
          }
          try {
              $env:PATH = "T:\bin;F:\bin;R:\bin;$env:PATH"
              $env:PKG_CONFIG_PATH = "F:\lib\pkgconfig;R:\lib\pkgconfig;V:\lib\pkgconfig"
              $env:USE_SYSTEM_FRIDA = "1"
              $env:GIO_EXTRA_MODULES = "V:\plugins\glib-networking"
              swift run --package-path . luma-bundle-compiler `
                  --config       (Join-Path (Get-Location) 'Agent\bundle.json') `
                  --project-root (Get-Location) `
                  --staging-dir  (Join-Path (Get-Location) '.build\AgentStaging')
              if ($LASTEXITCODE -ne 0) { throw "luma-bundle-compiler failed ($LASTEXITCODE)" }
              cd LumaGtk
              swift build -c release `
                  --build-path B:\ `
                  -Xlinker /ignore:importeddllmain `
                  -Xlinker /ignore:4217
              if ($LASTEXITCODE -ne 0) { throw "swift build failed ($LASTEXITCODE)" }
          } finally {
              foreach ($letter in $mappings.Keys) {
                  & $subst $letter /d | Out-Null
              }
          }

      - name: Package MSI
        shell: pwsh
        run: |
          cd LumaGtk
          .\scripts\windows\package-msi.ps1 -SkipBuild -Configuration release `
              -Version "$env:LUMA_VERSION" `
              -Arch "${{ matrix.win_arch }}" `
              -BuildPath "$env:RUNNER_TEMP/b" `
              -VcpkgPrefix "C:/vcpkg/installed/${{ matrix.vcpkg_triplet }}" `
              -FridaPrefix "$env:RUNNER_TEMP/frida-prefix" `
              -R2Prefix    "$env:RUNNER_TEMP/r2-prefix"

      - uses: actions/upload-artifact@v7
        with:
          name: Luma-${{ env.LUMA_VERSION }}-${{ matrix.win_arch }}.msi
          path: LumaGtk/build/Luma-${{ env.LUMA_VERSION }}-${{ matrix.win_arch }}.msi
          if-no-files-found: error

  release:
    if: github.ref_type == 'tag'
    needs: [macos, ios, fedora, ubuntu, flatpak, snap, windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          files: |
            artifacts/Luma-*.dmg
            artifacts/Luma-*.dmg.sig
            artifacts/Luma-*.msi
            artifacts/Luma-*.ipa
            artifacts/luma-*.deb
            artifacts/luma-*.rpm
            artifacts/luma-*.snap
            artifacts/luma-*.flatpak
          fail_on_unmatched_files: true

      - name: Check out main for flake.nix bump
        uses: actions/checkout@v6
        with:
          ref: main
          path: repo
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Pin flake.nix to ${{ github.ref_name }}
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          deb=artifacts/luma-${VERSION}-ubuntu-24.04-x86_64.deb
          ubuntu_rel=24.04
          hash="sha256-$(openssl dgst -sha256 -binary "$deb" | base64)"
          cd repo
          sed -i \
            -e "s|version = \"[^\"]*\";|version = \"${VERSION}\";|" \
            -e "s|ubuntu-[0-9.]*-x86_64\\.deb|ubuntu-${ubuntu_rel}-x86_64.deb|" \
            -e "s|hash = \"sha256-[^\"]*\";|hash = \"${hash}\";|" \
            flake.nix
          if git diff --quiet flake.nix; then
            echo "flake.nix already up to date"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add flake.nix
          git commit -m "nix: Pin flake.nix to ${VERSION}"
          git push

      - name: Notify luma-website
        env:
          GH_TOKEN: ${{ secrets.LUMA_WEBSITE_DISPATCH_TOKEN }}
        run: |
          gh api repos/frida/luma-website/dispatches \
            -X POST \
            -f event_type=luma-released \
            -F client_payload[version]="${{ github.ref_name }}"
